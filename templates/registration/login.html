<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
  </head>
  <body style="font-family: Arial; margin: 40px">
    <h2>Login</h2>

    {% if form.errors %}
    <p style="color: red">Invalid username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
  </body>
</html>
